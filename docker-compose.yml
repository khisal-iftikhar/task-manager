version: "3.8"

services:
  backend:
    build: ./backend
    container_name: taskmanager-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
    container_name: taskmanager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
