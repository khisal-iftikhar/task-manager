# YOUR TASK:
# This workflow file is INCOMPLETE. You need to fill in the missing steps
# marked with TODO comments. The pipeline should:
#
#   1. Run backend tests (.NET Core)
#   2. Build Docker images for backend and frontend
#   3. Push images to Docker Hub
#   4. Trigger a redeploy on Railway
#
# SETUP REQUIRED (GitHub Repository Secrets):
#   - DOCKER_USERNAME: Your Docker Hub username
#   - DOCKER_PASSWORD: Your Docker Hub password/access token
#   - RAILWAY_TOKEN: Your Railway API token (Dashboard → Account → Tokens)
#
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run Backend Tests ──
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # TODO: Add a step to run .NET tests
      # Hint: cd backend && dotnet test
      - name: Run tests
        run: dotnet test backend/TaskApi.csproj

  # ── Job 2: Build and Push Docker Images ──
  build-and-push:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO: Log in to Docker Hub
      # Hint: Use the docker/login-action@v3 action
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # TODO: Build and push the backend Docker image
      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest

      # TODO: Build and push the frontend Docker image
      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest \
            --build-arg REACT_APP_API_URL=/api ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest

  # ── Job 3: Deploy to Railway ──
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO: Install the Railway CLI and trigger a redeploy
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway redeploy --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}