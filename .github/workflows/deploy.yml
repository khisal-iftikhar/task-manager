# ============================================================================
# ASE Foundations — Day 9 CI/CD Exercise
# GitHub Actions Workflow: Build, Test, and Deploy to Railway
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run Backend Tests ──
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests
        run: dotnet test backend/TaskApi.csproj

  # ── Job 2: Build and Push Docker Images ──
  build-and-push:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest \
            --build-arg REACT_APP_API_URL=/api ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest

  # ── Job 3: Deploy to Railway ──
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Finalize Deployment
        run: echo "Build and Push successful. Railway will now auto-deploy via GitHub Integration."